services:
  backend:
    build:
      context: ./backend
    container_name: decoration-pm-backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: decoration-pm-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
