server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 2s;
    set $backend_host "backend:8000";

    location = /health {
        access_log off;
        default_type application/json;
        charset utf-8;
        add_header Cache-Control "no-store" always;
        return 200 "{\"status\":\"ok\",\"component\":\"frontend\",\"version\":\"1.0.0\",\"timestamp\":\"$time_iso8601\",\"checks\":{\"self\":\"ok\"}}";
    }

    location = /health/full {
        access_log off;
        default_type application/json;
        charset utf-8;
        add_header Cache-Control "no-store" always;
        proxy_pass http://$backend_host/health/full;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @health_full_backend_down;
    }

    location @health_full_backend_down {
        access_log off;
        default_type application/json;
        charset utf-8;
        add_header Cache-Control "no-store" always;
        return 200 "{\"status\":\"degraded\",\"component\":\"frontend\",\"version\":\"1.0.0\",\"timestamp\":\"$time_iso8601\",\"checks\":{\"self\":\"ok\",\"backend\":\"unreachable\"},\"backend\":{\"error\":\"backend not reachable\"}}";
    }

    location = /api/health {
        proxy_pass http://$backend_host/api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /api/ {
        proxy_pass http://$backend_host/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50M;
    }

    location /docs {
        proxy_pass http://$backend_host/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://$backend_host/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
